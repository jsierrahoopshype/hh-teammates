<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teammates Score — Head-to-Head Video Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.js"></script>
<style>
  :root{
    --bg:#0d0f14; --panel:#151922; --text:#f5f5f7; --accent:#3b82f6;
    --sec:#8a93a6; --gold:#caa23a; --line:#222836;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
  header .mark{font-weight:800;color:var(--accent);letter-spacing:1px;font-size:13px;margin-left:auto}
  .wrap{display:flex;gap:22px;padding:22px;flex-wrap:wrap;align-items:flex-start}
  .controls{flex:0 0 360px;max-width:100%;display:flex;flex-direction:column;gap:14px}
  .stage{flex:1 1 480px;min-width:320px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--sec);font-weight:700}
  label{display:block;font-size:12px;color:var(--sec);margin:10px 0 5px;font-weight:600}
  input[type=text],select,input[type=number]{
    width:100%;background:#0e1219;border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:10px 11px;font-family:inherit;font-size:14px;
  }
  input[type=color]{width:46px;height:34px;border:1px solid var(--line);border-radius:8px;background:#0e1219;padding:2px;vertical-align:middle}
  .row{display:flex;gap:10px}
  .row>*{flex:1}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;background:#0e1219;color:var(--sec);border:none;padding:9px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 14px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;width:100%}
  .btn.ghost{background:#0e1219;border:1px solid var(--line);color:var(--text)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btns{display:flex;gap:10px;margin-top:6px}
  canvas#preview{width:100%;background:#000;border-radius:14px;border:1px solid var(--line);display:block}
  .progress{height:10px;background:#0e1219;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .1s linear}
  .meta{font-size:12px;color:var(--sec);line-height:1.5}
  .meta b{color:var(--text)}
  .pill{display:inline-block;background:#0e1219;border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:11px;color:var(--sec);margin:2px 4px 0 0}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>Teammates Score — Head-to-Head Video</h1>
  <span class="mark">HOOPSMATIC</span>
</header>

<div class="wrap">
  <!-- ============ CONTROLS ============ -->
  <div class="controls">
    <div class="card">
      <h2>Matchup</h2>
      <label>Player A</label>
      <input type="text" id="pa" list="playerlist" placeholder="Search player…" autocomplete="off">
      <label>Player B</label>
      <input type="text" id="pb" list="playerlist" placeholder="Search player…" autocomplete="off">
      <datalist id="playerlist"></datalist>
      <div id="matchmeta" class="meta" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h2>Format</h2>
      <label>Resolution</label>
      <select id="res">
        <option value="1920x1080">1920 × 1080 (landscape)</option>
        <option value="1280x720">1280 × 720 (landscape)</option>
        <option value="1080x1080" selected>1080 × 1080 (square)</option>
        <option value="1080x1920">1080 × 1920 (portrait)</option>
      </select>
      <div class="row">
        <div>
          <label>FPS</label>
          <select id="fps">
            <option value="24">24</option>
            <option value="30">30</option>
            <option value="60" selected>60</option>
          </select>
        </div>
        <div>
          <label>Target duration</label>
          <select id="dur">
            <option value="auto" selected>Auto (~60s)</option>
            <option value="30">~30s</option>
            <option value="45">~45s</option>
            <option value="90">~90s</option>
            <option value="manual">Manual / reveal</option>
          </select>
        </div>
      </div>
      <label>Seconds per reveal (override) — blank = auto</label>
      <input type="number" id="perItem" step="0.05" min="0.2" max="3" placeholder="auto">
      <label>Granularity</label>
      <div class="seg" id="gran">
        <button data-g="accolade" class="on">Per accolade</button>
        <button data-g="season">Per teammate-season</button>
      </div>
    </div>

    <div class="card">
      <h2>Style</h2>
      <label>Title line</label>
      <input type="text" id="title" value="Who had more help?">
      <label>Intro explainer line</label>
      <input type="text" id="explainer" value="Let's take a look at the accolades of their teammates">
      <label>Accent color</label>
      <input type="color" id="accent" value="#3b82f6">
      <span class="meta" style="margin-left:8px">Winner shown in this color.</span>
    </div>

    <div class="card">
      <h2>Render</h2>
      <button class="btn" id="preview-btn">▶ Preview animation</button>
      <div class="btns">
        <button class="btn" id="mp4-btn">⬇ Render MP4</button>
        <button class="btn ghost" id="webm-btn">⬇ Render WebM</button>
      </div>
      <div class="progress" style="margin-top:12px"><i id="bar"></i></div>
      <div id="status" class="meta" style="margin-top:8px">Idle.</div>
      <div class="btns" id="downloads" style="display:none">
        <a id="dl-mp4" class="btn" download style="display:none">Download MP4</a>
        <a id="dl-webm" class="btn ghost" download style="display:none">Download WebM</a>
      </div>
    </div>
  </div>

  <!-- ============ STAGE ============ -->
  <div class="stage">
    <canvas id="preview" width="1080" height="1080"></canvas>
    <div id="timeline" class="meta"></div>
  </div>
</div>

<script>
/* ============================================================
   Teammates Score — Head-to-Head video generator (standalone)
   Career-aligned scrolling timeline + share-card freeze frame.
   ============================================================ */
const DATA_URL   = "data/teammates.json";
const IDS_URL    = "data/headshot_ids.json";
const HEADSHOT_BASE = "https://jsierrahoopshype.github.io/nba-headshots/players/headshots/face/";
const PROXY_BASE    = "https://nba-battle.thejorgesierra.workers.dev/nba-headshot/";

const COL = { bg:"#0d0f14", panel:"#151922", text:"#f5f5f7", sec:"#8a93a6", gold:"#caa23a" };
const SIDE_B_TINT = "#ef6a5a";                 // warm tint for player B
const AWARD_LABEL = {
  "Most Valuable Player":"MVP",
  "All-NBA First Team":"All-NBA 1st Team","All-NBA Second Team":"All-NBA 2nd Team","All-NBA Third Team":"All-NBA 3rd Team",
  "All-Defensive First Team":"All-Defensive 1st Team","All-Defensive Second Team":"All-Defensive 2nd Team",
  "All-Rookie First Team":"All-Rookie 1st Team","All-Rookie Second Team":"All-Rookie 2nd Team"
};
const INTRO_SEC = 2.5, FINAL_SEC = 5, LEAD_SEC = 0.5, SETTLE_SEC = 0.8, TRANS_SEC = 0.4;
const FILLER_SEC = 0.4, CLOSE_SEC = 1.0;   // empty / career-over seasons get minimal time

let DB=null, BY_NAME={}, SCORES={}, TEAMS={}, HEADSHOT_IDS={};
let granularity = "accolade";
let busy = false;

const $ = id => document.getElementById(id);
const awLabel = a => AWARD_LABEL[a] || a;
const teamFull = t => (t && (TEAMS[t]||t)) || "";
const seasonCal = y => y;                        // calendar year as-is
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const fmt1 = n => n.toFixed(1);
const fmtPts = n => { const r = Math.round(n*1000)/1000; return r%1===0 ? r.toString() : parseFloat(r.toFixed(3)).toString(); };

/* normalize a name the same way build_teammates.py / the site tools do:
   NFKD -> ascii -> lowercase -> non-alphanumeric collapsed to spaces -> trim */
function normName(s){
  return s.normalize("NFKD").replace(/[̀-ͯ]/g,"").toLowerCase()
          .replace(/[^a-z0-9]+/g," ").trim();
}

/* ---------- boot ---------- */
async function boot(){
  try{
    const [dRes, idRes] = await Promise.all([
      fetch(DATA_URL, {cache:"no-cache"}),
      fetch(IDS_URL,  {cache:"no-cache"}).catch(()=>null)
    ]);
    DB = await dRes.json();
    SCORES = DB.scores; TEAMS = DB.teams || {};
    DB.players.forEach(p => BY_NAME[p.name] = p);
    if(idRes && idRes.ok){ try{ HEADSHOT_IDS = await idRes.json(); }catch(e){ HEADSHOT_IDS = {}; } }
    const dl = $("playerlist");
    const names = DB.players.map(p=>p.name).sort();
    dl.innerHTML = names.map(n=>`<option value="${n.replace(/"/g,'&quot;')}">`).join("");
    $("pa").value = BY_NAME["Michael Jordan"] ? "Michael Jordan" : names[0];
    $("pb").value = BY_NAME["LeBron James"]   ? "LeBron James"   : names[1];
    refreshMeta();
  }catch(e){
    $("status").textContent = "Could not load data/teammates.json — serve this file from the deployed site.";
    console.error(e);
  }
}

/* ============================================================
   HEADSHOT RESOLUTION  — cascading chain, tried in order until one
   image actually loads, else initials:
     1) deployed face crop (player.hs)
     2) CORS proxy by NBA id from headshot_ids.json (normalized name)
     3) CORS proxy by id parsed out of the hs filename (covers mangled
        slugs whose face crop 404s, e.g. "1629029-luka-doni.png")
   ============================================================ */
function headshotCandidates(name){
  const rec = BY_NAME[name];
  const urls = [];
  if(rec && rec.hs) urls.push(HEADSHOT_BASE + rec.hs);          // (1) face crop
  const id = HEADSHOT_IDS[normName(name)];
  if(id != null) urls.push(PROXY_BASE + id);                    // (2) proxy by mapped id
  if(rec && rec.hs){ const m = /^(\d+)/.exec(rec.hs); if(m) urls.push(PROXY_BASE + m[1]); } // (3) proxy by hs id
  return [...new Set(urls)];
}
const urlCache = {};                 // url -> Promise<Image|null>
function loadImg(url){
  if(!url) return Promise.resolve(null);
  if(urlCache[url]) return urlCache[url];
  urlCache[url] = new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = url;
  });
  return urlCache[url];
}
/* try candidates in order; resolve with the first that loads, else null */
async function loadHead(name){
  const cands = headshotCandidates(name);
  for(const url of cands){ const img = await loadImg(url); if(img) return img; }
  return null;
}
/* preload every headshot a render will need; returns name -> Image|null.
   Logs misses (names that fell through to initials) for diagnosis. */
async function preloadHeads(names, onProgress){
  const uniq = [...new Set(names)];
  const map = {}, misses = [];
  let done = 0;
  await Promise.all(uniq.map(async nm => {
    const img = await loadHead(nm);
    map[nm] = img;
    if(!img) misses.push(nm + (headshotCandidates(nm).length ? " (had url, load failed)" : " (no id/hs)"));
    done++; if(onProgress) onProgress(done, uniq.length);
  }));
  if(misses.length) console.warn(`[headshots] ${misses.length}/${uniq.length} fell back to initials:`, misses.sort());
  return map;
}

/* ============================================================
   DATA MODEL
   ============================================================ */
const _byYear = new WeakMap();
function byYear(p){
  if(_byYear.has(p)) return _byYear.get(p);
  const m = {}; for(const s of p.detail) m[s.y] = s; _byYear.set(p, m); return m;
}
/* rows for one season's decorated mates on one side */
function seasonRows(entry, side){
  if(!entry) return [];
  const out = [];
  for(const mate of entry.mates){
    if(granularity === "accolade"){
      for(const a of mate.a) out.push({ side, teammate:mate.n, awards:[a], points:(SCORES[a]||0) });
    } else {
      let pts=0; for(const a of mate.a) pts += (SCORES[a]||0);
      out.push({ side, teammate:mate.n, awards:mate.a.slice(), points:pts });
    }
  }
  return out;
}
/* career-aligned plan: EVERY career-season index from 1..max appears (the
   video always opens on Season 1). A career end yields a single 'closing'
   card, after which that side is 'dim'. Both-empty seasons are kept but
   marked bothEmpty (rendered slim, scrolled past fast). */
function buildPlan(pA,pB){
  const dA=byYear(pA), dB=byYear(pB);
  const maxN=Math.max(pA.years.length, pB.years.length);
  let shownA=false, shownB=false;
  const plan=[];
  for(let n=1;n<=maxN;n++){
    const yA=n<=pA.years.length?pA.years[n-1]:null;
    const yB=n<=pB.years.length?pB.years[n-1]:null;
    const eA=yA!=null?dA[yA]:undefined, eB=yB!=null?dB[yB]:undefined;
    const rowsA=seasonRows(eA,"A"), rowsB=seasonRows(eB,"B");
    const aOver=yA==null, bOver=yB==null;
    let colA = !aOver ? (rowsA.length?{type:"rows",rows:rowsA}:{type:"empty",rows:[]})
                      : (!shownA?{type:"closing",rows:[]}:{type:"dim",rows:[]});
    let colB = !bOver ? (rowsB.length?{type:"rows",rows:rowsB}:{type:"empty",rows:[]})
                      : (!shownB?{type:"closing",rows:[]}:{type:"dim",rows:[]});
    if(colA.type==="closing") shownA=true;
    if(colB.type==="closing") shownB=true;
    // a "filler" season has no reveal rows and no closing card on either side
    const hasRows = rowsA.length>0 || rowsB.length>0;
    const hasClosing = colA.type==="closing" || colB.type==="closing";
    const bothEmpty = !hasRows && !hasClosing;
    plan.push({ n, yA, yB, teamA:eA?eA.t:null, teamB:eB?eB.t:null, aOver, bOver, colA, colB, bothEmpty });
  }
  return plan;
}
/* every teammate that will appear (for preload) */
function involvedNames(pA,pB){
  const set = new Set([pA.name, pB.name]);
  for(const p of [pA,pB]) for(const s of p.detail) for(const m of s.mates) set.add(m.n);
  return [...set];
}
/* aggregate a player's teammates for the final card */
function aggregate(p){
  const m = {};
  for(const s of p.detail) for(const mate of s.mates){
    const e = m[mate.n] || (m[mate.n] = { name:mate.n, pts:0, aw:{} });
    e.pts += mate.p;
    for(const a of mate.a) e.aw[a] = (e.aw[a]||0) + 1;
  }
  const list = Object.values(m).sort((a,b)=> b.pts - a.pts || a.name.localeCompare(b.name));
  list.forEach(e => e.marquee = marqueeAccolades(e.aw));
  return list;
}
function marqueeAccolades(aw){
  const items = Object.keys(aw).sort((x,y)=> (SCORES[y]||0)-(SCORES[x]||0) || aw[y]-aw[x]);
  return items.slice(0,2).map(a => (aw[a]>1 ? `${aw[a]}× ` : "") + awLabel(a)).join(" · ");
}

/* ---------- pacing (anchor-driven; empty/career-over seasons get minimal time) ----------
   A waypoint is created per reveal slot ('beat'), per career-over card ('close'),
   and per both-empty season ('filler'). The first waypoint is reached after LEAD
   (cold open on Season 1); each later one adds time by its kind. */
function buildSchedule(plan, perItem){
  const wps = [];
  plan.forEach((pb,bi)=>{
    const sc = Math.max(pb.colA.rows.length, pb.colB.rows.length);
    if(sc>0){ for(let i=0;i<sc;i++) wps.push({ kind:"beat", bi, ai:i }); }
    else if(pb.colA.type==="closing" || pb.colB.type==="closing") wps.push({ kind:"close", bi });
    else wps.push({ kind:"filler", bi });
  });
  let t = 0;
  wps.forEach((w,i)=>{
    t += (i===0 ? LEAD_SEC : w.kind==="beat" ? perItem : w.kind==="close" ? CLOSE_SEC : FILLER_SEC);
    w.time = t;
  });
  const scrollSec = (wps.length ? wps[wps.length-1].time : LEAD_SEC) + SETTLE_SEC;
  return { wps, scrollSec };
}
function pacing(plan){
  const beats = plan.reduce((a,pb)=>a+Math.max(pb.colA.rows.length, pb.colB.rows.length), 0);
  const durSel = $("dur").value, manual = parseFloat($("perItem").value);
  let perItem;
  if(!isNaN(manual) && manual>0)      perItem = manual;
  else if(durSel === "manual")        perItem = 0.7;
  else { const target = durSel==="auto" ? 60 : parseFloat(durSel);
         perItem = clamp(target / Math.max(beats,1), 0.35, 1.2); }
  const { scrollSec } = buildSchedule(plan, perItem);
  const total = INTRO_SEC + scrollSec + TRANS_SEC + FINAL_SEC;
  return { perItem, scrollSec, total, beats };
}
function getOpts(){
  const [w,h] = $("res").value.split("x").map(Number);
  return { w, h, fps: parseInt($("fps").value, 10),
           accent: $("accent").value || "#3b82f6", title: $("title").value || "",
           explainer: $("explainer").value || "" };
}
function refreshMeta(){
  const pA = BY_NAME[$("pa").value], pB = BY_NAME[$("pb").value];
  if(!pA || !pB){ $("matchmeta").innerHTML = "Pick two players."; $("timeline").textContent=""; return; }
  const plan = buildPlan(pA,pB);
  const fillers = plan.filter(pb=>pb.bothEmpty).length;
  const { perItem, scrollSec, total, beats } = pacing(plan);
  $("matchmeta").innerHTML =
    `<b>${pA.name}</b> — ${pA.score} · ${pA.perSeason}/season · ${pA.seasons} seasons · ${pA.rings}🏆<br>`+
    `<b>${pB.name}</b> — ${pB.score} · ${pB.perSeason}/season · ${pB.seasons} seasons · ${pB.rings}🏆`;
  $("timeline").innerHTML =
    `<span class="pill">${beats} reveals</span>`+
    `<span class="pill">${perItem.toFixed(2)}s each</span>`+
    `<span class="pill">${plan.length} seasons (${fillers} empty)</span>`+
    `<span class="pill">scroll ${scrollSec.toFixed(1)}s</span>`+
    `<span class="pill"><b>≈ ${total.toFixed(1)}s total</b></span>`+
    `<span class="pill">intro ${INTRO_SEC}s · trans ${TRANS_SEC}s · finale ${FINAL_SEC}s</span>`;
}

/* ============================================================
   GEOMETRY
   ============================================================ */
function buildGeom(opts){
  const W=opts.w, H=opts.h, S=Math.min(W,H)/1080;
  const sbH = Math.min(Math.max(H*0.16, S*180), H*0.22);        // hero scoreboard, <=22% H
  const viewportTop = sbH, viewportH = H - sbH;
  const fireLineY = viewportTop + viewportH*0.34;               // trigger line (upper-third)
  const leftColX0 = W*0.04,  leftColX1 = W*0.49;
  const rightColX0 = W*0.51, rightColX1 = W*0.96;
  const rowH = S*80, headerH = S*66, blockGap = S*16, chipR = rowH*0.32;
  return { W,H,S, sbH, viewportTop, viewportH, fireLineY,
           leftColX0,leftColX1,rightColX0,rightColX1, rowH, headerH, blockGap, chipR };
}
/* lay the plan out in document space; collect anchors (reveal slots).
   Each block gets a kind: 'content' (>=1 reveal), 'close' (career-over card
   only), or 'filler' (both-empty season — slim, scrolled past fast). */
function buildDocument(plan, geom){
  const { rowH, headerH, blockGap, viewportTop, fireLineY } = geom;
  const fireOffset = fireLineY - viewportTop;
  const blocks=[], rows=[], anchors=[]; let docY=0;
  for(const pb of plan){
    const rowsA = pb.colA.rows, rowsB = pb.colB.rows;
    const slotCount = Math.max(rowsA.length, rowsB.length);
    const hasClosing = pb.colA.type==="closing" || pb.colB.type==="closing";
    const kind = slotCount>0 ? "content" : hasClosing ? "close" : "filler";
    const slots = t => t==="rows" ? 0 : t==="dim" ? 0 : 1;       // closing/empty occupy 1 slot
    const slotsA = pb.colA.type==="rows" ? rowsA.length : slots(pb.colA.type);
    const slotsB = pb.colB.type==="rows" ? rowsB.length : slots(pb.colB.type);
    const bodyH = kind==="filler" ? rowH*0.7 : Math.max(slotsA, slotsB, 1) * rowH;
    const top = docY, bodyTop = top + headerH;
    const blockAnchors = [];
    for(let i=0;i<slotCount;i++){
      const docCenter = bodyTop + i*rowH + rowH/2;
      const an = { docY:docCenter, fire:docCenter-fireOffset, rows:[], time:0, side:null };
      const rA=rowsA[i], rB=rowsB[i];
      if(rA){ rA.centerDoc=docCenter; rA.fire=an.fire; an.rows.push(rA); rows.push(rA); }
      if(rB){ rB.centerDoc=docCenter; rB.fire=an.fire; an.rows.push(rB); rows.push(rB); }
      let s=null,mp=-1; for(const r of an.rows) if(r.points>mp){ mp=r.points; s=r.side; } an.side=s;
      anchors.push(an); blockAnchors.push(an);
    }
    const centerDoc = bodyTop + bodyH/2;
    blocks.push({ ...pb, top, headerH, bodyH, height: headerH + bodyH + blockGap,
                  kind, anchors:blockAnchors, centerFire: centerDoc - fireOffset });
    docY += headerH + bodyH + blockGap;
  }
  return { blocks, rows, anchors, docHeight:docY };
}

/* ============================================================
   PRIMITIVES
   ============================================================ */
function rr(ctx,x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);     ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
const nameFont = s => `600 ${s}px 'DM Sans',sans-serif`;
const numFont  = s => `700 ${s}px 'JetBrains Mono',monospace`;
function fitText(ctx, text, max){
  const m = ctx.font.match(/^(.*?)(\d+(?:\.\d+)?)px(.*)$/);
  if(!m) return;
  const pre=m[1], post=m[3]; let size=parseFloat(m[2]);
  while(size>8 && ctx.measureText(text).width>max){ size-=1; ctx.font = `${pre}${size}px${post}`; }
}
const PALETTE = ["#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6","#ec4899","#14b8a6","#f97316"];
function colorFor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h%PALETTE.length]; }
function drawHead(ctx, img, cx, cy, r, ringColor, name){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath();
  if(img){
    ctx.clip();
    const iw=img.naturalWidth, ih=img.naturalHeight, side=Math.min(iw,ih);
    ctx.drawImage(img,(iw-side)/2,(ih-side)/2,side,side, cx-r,cy-r,r*2,r*2);
  } else {
    ctx.fillStyle="#1b2130"; ctx.fill();
    ctx.fillStyle=colorFor(name||"?"); ctx.globalAlpha=.35; ctx.fill(); ctx.globalAlpha=1;
    const parts=(name||"?").split(/\s+/);
    const ini=((parts[0]||" ")[0]+(parts.length>1?parts[parts.length-1][0]:"")).toUpperCase();
    ctx.fillStyle=COL.text; ctx.font=nameFont(r*0.9);
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(ini,cx,cy+r*0.04);
  }
  ctx.restore();
  if(ringColor){ ctx.lineWidth=Math.max(2,r*0.07); ctx.strokeStyle=ringColor;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); }
}
function ringArc(ctx,cx,cy,r,color,frac){
  if(frac<=0) return;
  ctx.save(); ctx.lineWidth=Math.max(2,r*0.07); ctx.strokeStyle=color; ctx.lineCap="round";
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+frac*Math.PI*2); ctx.stroke(); ctx.restore();
}
function drawBackground(ctx, R){
  const { W,H } = R.geom;
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,H);
  const g = ctx.createRadialGradient(W/2, H*0.40, 0, W/2, H*0.40, Math.max(W,H)*0.78);
  g.addColorStop(0, "#13161e"); g.addColorStop(1, "#0a0c11");
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
}

/* ============================================================
   FIXED HERO SCOREBOARD
   ============================================================ */
function sidePulse(R, side){          // scoreboard number pop when a big reveal bumps it
  if(R.ts==null) return 0; let best=0;
  for(const t of R.bigCross[side]){ const d=R.ts-t; if(d>=-0.05) best=Math.max(best, clamp(1-d/0.35,0,1)); }
  return best;
}
function gapPop(R){                    // GAP pill pops on every reveal
  if(R.ts==null) return 0; let best=0;
  for(const t of R.anchorTimes){ const d=R.ts-t; if(d>=0) best=Math.max(best, clamp(1-d/0.3,0,1)); }
  return best;
}
/* Explicit vertical layout: headshot, then name (full width, never clipped),
   then score, with safe gaps at all resolutions. Each score keeps its own side
   color; the leader is full opacity + slight scale + a small triangle, the
   trailer is dimmed. GAP pill centered. No persistent question kicker. */
function drawTopScoreboard(ctx, R, valA, valB){
  const G=R.geom, S=G.S, W=G.W, sbH=G.sbH;
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,sbH);                  // opaque band
  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,"rgba(59,130,246,0)"); grad.addColorStop(.5,"rgba(120,140,180,.55)"); grad.addColorStop(1,"rgba(239,106,90,0)");
  ctx.fillStyle = grad; ctx.fillRect(0, sbH-Math.max(1,S*2), W, Math.max(1,S*2));
  const r = sbH*0.205, headCY = sbH*0.25, leftX = W*0.20, rightX = W*0.80;
  const aLead = valA>valB+1e-9, bLead = valB>valA+1e-9;
  drawSbSide(ctx, R, leftX,  headCY, r, R.imgA, R.pA.name, valA, R.accent,    "A", aLead, sidePulse(R,"A"));
  drawSbSide(ctx, R, rightX, headCY, r, R.imgB, R.pB.name, valB, SIDE_B_TINT, "B", bLead, sidePulse(R,"B"));
  drawGapPill(ctx, R, W/2, sbH*0.42, Math.abs(valA-valB));
}
function drawSbSide(ctx, R, cx, cy, r, img, name, val, sideColor, side, lead, pulse){
  const G=R.geom, S=G.S, W=G.W, sbH=G.sbH, dim = lead ? 1 : 0.55;
  drawHead(ctx, img, cx, cy, r, R.activeSide===side?R.accent:"#2a3142", name);
  ctx.save(); ctx.globalAlpha = dim;
  // name — fit to its half so it never clips or runs under the circle
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle = COL.text; ctx.font = `700 ${S*19}px 'DM Sans',sans-serif`;
  ctx.save(); fitText(ctx, name, W*0.40); ctx.fillText(name, cx, sbH*0.60); ctx.restore();
  // score (own side color, always)
  const scoreY = sbH*0.92, sc = (lead?1.06:1)*(1+0.22*pulse);
  ctx.save(); ctx.translate(cx, scoreY); ctx.scale(sc, sc);
  ctx.fillStyle = sideColor; ctx.font = numFont(S*46);
  ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(fmt1(val), 0, 0);
  ctx.restore();
  ctx.restore();
  if(lead){                                   // leader triangle, full opacity
    ctx.font = numFont(S*46); const tw = ctx.measureText(fmt1(val)).width*(1.06);
    const ax = cx - tw/2 - S*18, ay = scoreY - S*13;
    ctx.fillStyle = sideColor;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax+S*13,ay); ctx.lineTo(ax+S*6.5,ay-S*12); ctx.closePath(); ctx.fill();
  }
}
function drawGapPill(ctx, R, cx, cy, gap){
  const S=R.geom.S, pop=gapPop(R), txt=fmt1(gap);
  ctx.save(); ctx.font = numFont(S*30); const tw = ctx.measureText(txt).width; ctx.restore();
  const padX=S*16, w = tw + padX*2 + S*48, h = S*44, sc = 1+0.12*pop;
  ctx.save();
  ctx.translate(cx,cy); ctx.scale(sc,sc); ctx.translate(-cx,-cy);
  rr(ctx, cx-w/2, cy-h/2, w, h, h/2);
  const g = ctx.createLinearGradient(cx-w/2,0,cx+w/2,0); g.addColorStop(0,R.accent); g.addColorStop(1,SIDE_B_TINT);
  ctx.globalAlpha = 0.18+0.14*pop; ctx.fillStyle = g; ctx.fill(); ctx.globalAlpha = 1;
  ctx.lineWidth = Math.max(1,S*1.5); ctx.strokeStyle = R.accent; ctx.globalAlpha = 0.45+0.55*pop; ctx.stroke(); ctx.globalAlpha = 1;
  ctx.textBaseline="middle"; ctx.textAlign="left";
  ctx.fillStyle = COL.sec; ctx.font = `700 ${S*15}px 'DM Sans',sans-serif`; ctx.fillText("GAP", cx-w/2+padX, cy+S*1);
  ctx.textAlign="right"; ctx.fillStyle = COL.text; ctx.font = numFont(S*30); ctx.fillText(txt, cx+w/2-padX, cy+S*1);
  ctx.restore();
}
function drawChrome(ctx, R){          // wordmark only — the question lives on the intro
  const { W,H,S } = R.geom;
  ctx.textAlign="right"; ctx.textBaseline="bottom";
  ctx.fillStyle = R.accent; ctx.font = `800 ${S*16}px 'DM Sans',sans-serif`;
  ctx.fillText("HOOPSMATIC", W - S*16, H - S*14);
}

/* ============================================================
   SCROLLING DOCUMENT
   ============================================================ */
function edgeAlpha(G, top, h){
  const aIn  = clamp((G.H - top)/(G.S*70), 0, 1);
  const aOut = clamp((top + h - G.viewportTop)/(G.S*70), 0, 1);
  return Math.min(aIn, aOut);
}
/* revealed (above trigger) = full; upcoming (below) stays visible but dim, so the
   content area is never mostly-empty; the reveal "pop" is the glow + scoreboard tick */
function rowAlphaAt(G, centerScreen){
  if(centerScreen <= G.fireLineY) return clamp((centerScreen - G.viewportTop)/(G.S*55), 0, 1);
  return clamp(1 - (centerScreen - G.fireLineY)/(G.S*210), 0.12, 1);
}
function drawScrollFrame(ctx, R, scrollPx, valA, valB){
  const G = R.geom;
  drawBackground(ctx, R);
  ctx.save();
  ctx.beginPath(); ctx.rect(0, G.viewportTop, G.W, G.viewportH); ctx.clip();
  for(const block of R.doc.blocks){
    const screenTop = G.viewportTop + (block.top - scrollPx);
    if(screenTop > G.H || screenTop + block.height < G.viewportTop) continue;
    drawHeader(ctx, R, block, screenTop);
    const bodyTop = screenTop + block.headerH;
    if(block.kind==="filler"){
      const cy = bodyTop + block.bodyH/2, a = edgeAlpha(G, cy-G.rowH/2, G.rowH)*0.5;
      if(a>0.01){ ctx.save(); ctx.globalAlpha=a; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillStyle="#5a6172"; ctx.font=nameFont(G.S*15);
        ctx.fillText("no decorated teammates", G.W/2, cy); ctx.restore(); }
      continue;
    }
    drawColumn(ctx, R, block, "A", G.leftColX0,  G.leftColX1,  bodyTop, scrollPx);
    drawColumn(ctx, R, block, "B", G.rightColX0, G.rightColX1, bodyTop, scrollPx);
  }
  ctx.restore();
  drawTopScoreboard(ctx, R, valA, valB);
  drawChrome(ctx, R);
}
function drawHeader(ctx, R, block, screenTop){
  const G=R.geom, S=G.S, a=edgeAlpha(G, screenTop, block.headerH);
  if(a<=0.01) return;
  ctx.save(); ctx.globalAlpha=a;
  // contained band with a thin top border
  ctx.fillStyle = "#11141d"; ctx.fillRect(0, screenTop, G.W, block.headerH);
  ctx.fillStyle = "rgba(255,255,255,0.08)"; ctx.fillRect(0, screenTop, G.W, Math.max(1,S*1.5));
  const cy = screenTop + block.headerH*0.50;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = COL.text; ctx.font = `800 ${S*22}px 'DM Sans',sans-serif`;
  ctx.fillText(`SEASON ${block.n}`, G.W/2, cy);
  ctx.font = nameFont(S*16);
  if(!block.aOver && block.colA.type!=="dim"){
    ctx.fillStyle=R.accent; ctx.textAlign="left";
    const t=`${block.yA}${block.teamA?" · "+teamFull(block.teamA):""}`;
    ctx.save(); fitText(ctx,t,G.leftColX1-G.leftColX0); ctx.fillText(t,G.leftColX0,cy); ctx.restore();
  }
  if(!block.bOver && block.colB.type!=="dim"){
    ctx.fillStyle=SIDE_B_TINT; ctx.textAlign="right";
    const t=`${block.yB}${block.teamB?" · "+teamFull(block.teamB):""}`;
    ctx.save(); fitText(ctx,t,G.rightColX1-G.rightColX0); ctx.fillText(t,G.rightColX1,cy); ctx.restore();
  }
  const ry = screenTop + block.headerH - Math.max(1,S*1.5);
  const grad = ctx.createLinearGradient(0,0,G.W,0);
  grad.addColorStop(0,"rgba(255,255,255,0)"); grad.addColorStop(.5,"rgba(255,255,255,.16)"); grad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.fillStyle = grad; ctx.fillRect(0, ry, G.W, Math.max(1,S*1.5));
  ctx.restore();
}
function drawColumn(ctx, R, block, side, x0, x1, bodyTop, scrollPx){
  const G=R.geom, col = side==="A"?block.colA:block.colB, tint = side==="A"?R.accent:SIDE_B_TINT;
  if(col.type==="dim") return;                                   // ended side — just dimmed/empty
  if(col.type==="closing"){ drawClosing(ctx, R, side, x0, x1, bodyTop, block.bodyH, tint); return; }
  if(col.type==="empty"){
    const cy = bodyTop + block.bodyH/2, a = edgeAlpha(G, cy-G.rowH/2, G.rowH)*0.45;
    if(a>0.01){ ctx.save(); ctx.globalAlpha=a; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle="#5a6172"; ctx.font=nameFont(G.S*15);
      ctx.fillText("no decorated teammates",(x0+x1)/2,cy); ctx.restore(); }
    return;
  }
  col.rows.forEach((r,i)=>{
    const ty = bodyTop + i*G.rowH;
    const centerScreen = G.viewportTop + (r.centerDoc - scrollPx);
    const a = rowAlphaAt(G, centerScreen);
    if(a<=0.01) return;
    const slide = centerScreen>G.fireLineY ? clamp((centerScreen-G.fireLineY)/(G.S*40),0,1)*G.S*8 : 0;
    drawRow(ctx, R, r, x0, x1, ty + slide, a, tint);
  });
}
function drawClosing(ctx, R, side, x0, x1, bodyTop, bodyH, tint){
  const G=R.geom, S=G.S, p = side==="A"?R.pA:R.pB, pad=S*6;
  const h = Math.min(bodyH, G.rowH) - 2*pad;
  const y = bodyTop + (bodyH - (h+2*pad))/2 + pad, x=x0, w=x1-x0;
  const a = edgeAlpha(G, y, h)*0.6;
  if(a<=0.01) return;
  ctx.save(); ctx.globalAlpha=a;
  rr(ctx,x,y,w,h,S*12); ctx.fillStyle="#151823"; ctx.fill();
  ctx.lineWidth=Math.max(1,S*1.2); ctx.strokeStyle=tint; ctx.globalAlpha=a*0.6; ctx.stroke(); ctx.globalAlpha=a;
  rr(ctx,x,y,S*4,h,S*2); ctx.fillStyle=tint; ctx.fill();
  const tx=x+S*18, cy=y+h/2;
  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillStyle=tint; ctx.font=`700 ${S*20}px 'DM Sans',sans-serif`;
  ctx.save(); fitText(ctx,p.name,w*0.58); ctx.fillText(p.name,tx,cy-S*10); ctx.restore();
  ctx.fillStyle=COL.sec; ctx.font=nameFont(S*15); ctx.fillText("career over",tx,cy+S*12);
  ctx.textAlign="right"; ctx.fillStyle=tint; ctx.font=numFont(S*26); ctx.fillText(fmtPts(p.score),x1-S*16,cy);
  ctx.restore();
}
function drawRow(ctx, R, r, x0, x1, ty, baseAlpha, tint){
  const G=R.geom, S=G.S, rowH=G.rowH;
  const big = r.points>=4, tiny = r.points<1, pad=S*6;
  const x=x0, y=ty+pad, w=x1-x0, h=rowH-2*pad, cy=y+h/2;
  let glow=0;
  if(big && R.ts!=null){ const d=R.ts-r.crossTime; if(d>=-0.2) glow=clamp(1-Math.abs(d)/0.35,0,1); }
  ctx.save(); ctx.globalAlpha = baseAlpha*(tiny?0.85:1);
  const sc = big&&glow>0 ? 1+0.05*glow : 1;
  if(sc!==1){ ctx.translate(x+w/2,cy); ctx.scale(sc,sc); ctx.translate(-(x+w/2),-cy); }
  rr(ctx,x,y,w,h,S*12); ctx.fillStyle = big?"#1b2030":"#151823"; ctx.fill();
  if(big){ ctx.save(); ctx.globalAlpha=baseAlpha*(0.35+0.65*glow); ctx.lineWidth=Math.max(1,S*1.5); ctx.strokeStyle=tint;
    rr(ctx,x,y,w,h,S*12); ctx.stroke(); ctx.restore(); }
  if(glow>0){ ctx.save(); rr(ctx,x,y,w,h,S*12); ctx.clip(); ctx.globalAlpha=baseAlpha*0.22*glow;
    ctx.fillStyle=tint; ctx.fillRect(x,y,w,h); ctx.restore(); }
  rr(ctx,x,y,S*4,h,S*2); ctx.fillStyle=tint; ctx.fill();          // 4px left accent bar
  const chipR=h*0.36, chipCx=x+S*14+chipR;
  drawHead(ctx, R.heads[r.teammate]||null, chipCx, cy, chipR, null, r.teammate);
  const ptsTxt = "+"+fmtPts(r.points);
  ctx.textAlign="right"; ctx.textBaseline="middle";
  ctx.fillStyle=tint; ctx.font=numFont(big?S*34:S*28);
  const pw=ctx.measureText(ptsTxt).width; ctx.fillText(ptsTxt, x1-S*14, cy);
  const tx = chipCx+chipR+S*14, tmax = x1 - S*14 - pw - S*12 - tx;
  ctx.textAlign="left";
  ctx.fillStyle=COL.text; ctx.font=`700 ${big?S*26:S*23}px 'DM Sans',sans-serif`; ctx.textBaseline="alphabetic";
  ctx.save(); fitText(ctx,r.teammate,tmax); ctx.fillText(r.teammate,tx,cy-S*3); ctx.restore();
  ctx.fillStyle=tint; ctx.font=nameFont(big?S*18:S*16);
  const labels=r.awards.map(awLabel).join(" · ");
  ctx.save(); fitText(ctx,labels,tmax); ctx.fillText(labels,tx,cy+S*19); ctx.restore();
  ctx.restore();
}

/* ============================================================
   INTRO (VS) + FINAL SHARE CARD
   ============================================================ */
function drawIntro(ctx, R, prog){
  const G=R.geom, S=G.S, W=G.W, H=G.H;
  drawBackground(ctx, R);
  drawChrome(ctx, R);
  const e = easeOutCubic(clamp(prog/0.45,0,1));
  ctx.globalAlpha = e;
  const r = Math.min(W,H)*0.15, leftX=W*0.27, rightX=W*0.73, cy=H*0.37;
  drawHead(ctx, R.imgA, leftX, cy, r, null, R.pA.name);
  drawHead(ctx, R.imgB, rightX, cy, r, null, R.pB.name);
  const ringP = easeOutCubic(clamp(prog/0.4,0,1));
  ringArc(ctx, leftX, cy, r, R.accent, ringP);
  ringArc(ctx, rightX, cy, r, SIDE_B_TINT, ringP);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle=R.accent; ctx.font=`800 ${S*64}px 'DM Sans',sans-serif`; ctx.fillText("VS", W/2, cy);
  ctx.fillStyle=COL.text; ctx.font=nameFont(S*28); ctx.textBaseline="alphabetic";
  ctx.save(); fitText(ctx,R.pA.name,r*2.4); ctx.fillText(R.pA.name,leftX,cy+r+S*42); ctx.restore();
  ctx.save(); ctx.font=nameFont(S*28); fitText(ctx,R.pB.name,r*2.4); ctx.fillText(R.pB.name,rightX,cy+r+S*42); ctx.restore();
  ctx.fillStyle=COL.gold; ctx.font=nameFont(S*18);
  ctx.fillText(R.pA.rings>0?`${R.pA.rings} ${R.pA.rings>1?"rings":"ring"}`:"no rings", leftX, cy+r+S*70);
  ctx.fillText(R.pB.rings>0?`${R.pB.rings} ${R.pB.rings>1?"rings":"ring"}`:"no rings", rightX, cy+r+S*70);
  ctx.textAlign="center";
  ctx.fillStyle=COL.sec; ctx.font=`700 ${S*20}px 'DM Sans',sans-serif`;
  ctx.fillText("TEAMMATES SCORE", W/2, H*0.66);
  if(R.title){ ctx.fillStyle=COL.text; ctx.font=`700 ${S*26}px 'DM Sans',sans-serif`;
    ctx.save(); fitText(ctx,R.title,W*0.84); ctx.fillText(R.title, W/2, H*0.71); ctx.restore(); }
  if(R.explainer){ ctx.fillStyle=COL.sec; ctx.font=nameFont(S*19);
    ctx.save(); fitText(ctx,R.explainer,W*0.86); ctx.fillText(R.explainer, W/2, H*0.755); ctx.restore(); }
  ctx.fillStyle=COL.sec; ctx.font=numFont(S*32);
  ctx.fillText("0.0", leftX, H*0.85); ctx.fillText("0.0", rightX, H*0.85);
  ctx.fillStyle=R.accent; ctx.font=numFont(S*36); ctx.fillText("0.0", W/2, H*0.852);
  ctx.globalAlpha=1;
}
function drawFinalCard(ctx, R, alpha){
  const G=R.geom, S=G.S, W=G.W, H=G.H, A=R.pA, B=R.pB;
  const finalA=A.score, finalB=B.score, aWin=finalA>=finalB;
  const winner=aWin?A:B, other=aWin?B:A;
  ctx.save(); ctx.globalAlpha=alpha;
  drawBackground(ctx, R);
  const m=W*0.04;
  rr(ctx,m,H*0.03,W-2*m,H*0.94,S*26); ctx.fillStyle=COL.panel; ctx.fill();
  ctx.lineWidth=Math.max(1,S*2); ctx.strokeStyle="#222a38"; ctx.stroke();
  const leftX=W*0.27, rightX=W*0.73, r=Math.min(W,H)*0.105, headCY=H*0.15;
  drawHead(ctx,R.imgA,leftX,headCY,r,aWin?R.accent:"#2a3142",A.name);
  drawHead(ctx,R.imgB,rightX,headCY,r,aWin?"#2a3142":R.accent,B.name);
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle=COL.text; ctx.font=nameFont(S*26);
  ctx.save(); fitText(ctx,A.name,r*2.7); ctx.fillText(A.name,leftX,headCY+r+S*34); ctx.restore();
  ctx.save(); ctx.font=nameFont(S*26); fitText(ctx,B.name,r*2.7); ctx.fillText(B.name,rightX,headCY+r+S*34); ctx.restore();
  ctx.fillStyle=aWin?R.accent:COL.sec; ctx.font=numFont(S*54); ctx.fillText(fmtPts(finalA),leftX,headCY+r+S*90);
  ctx.fillStyle=aWin?COL.sec:R.accent; ctx.font=numFont(S*54); ctx.fillText(fmtPts(finalB),rightX,headCY+r+S*90);
  ctx.fillStyle=COL.sec; ctx.font=nameFont(S*16); ctx.fillText("GAP", W/2, headCY-r*0.18);
  ctx.fillStyle=R.accent; ctx.font=numFont(S*40); ctx.fillText(fmt1(Math.abs(finalA-finalB)), W/2, headCY+r*0.4);
  // Verdict — career total leader and per-season leader, stated explicitly so a
  // name is never shown above the other player's better number.
  const careerLeader = winner;                       // by total score (finalA>=finalB)
  const psA = A.perSeason, psB = B.perSeason, psAled = psA >= psB;
  const psLeader = psAled ? A : B, psLead = psAled ? psA : psB, psOther = psAled ? psB : psA;
  if(careerLeader === psLeader){
    ctx.fillStyle=COL.text; ctx.font=`800 ${S*34}px 'DM Sans',sans-serif`; ctx.textAlign="center";
    ctx.save(); fitText(ctx,`${careerLeader.name} had more help, overall and per season`,W*0.88);
    ctx.fillText(`${careerLeader.name} had more help, overall and per season`,W/2,H*0.455); ctx.restore();
  } else {
    ctx.fillStyle=COL.text; ctx.font=`800 ${S*30}px 'DM Sans',sans-serif`; ctx.textAlign="center";
    ctx.save(); fitText(ctx,`${careerLeader.name} had more help overall`,W*0.88);
    ctx.fillText(`${careerLeader.name} had more help overall`,W/2,H*0.44); ctx.restore();
    ctx.fillStyle=COL.sec; ctx.font=`600 ${S*20}px 'DM Sans',sans-serif`;
    ctx.save(); fitText(ctx,`${psLeader.name} had more help per season · ${psLead.toFixed(2)} vs ${psOther.toFixed(2)}`,W*0.88);
    ctx.fillText(`${psLeader.name} had more help per season · ${psLead.toFixed(2)} vs ${psOther.toFixed(2)}`,W/2,H*0.485); ctx.restore();
  }
  drawTopTeammates(ctx, R, A, W*0.06, W*0.47, H*0.55, R.accent);
  drawTopTeammates(ctx, R, B, W*0.53, W*0.94, H*0.55, SIDE_B_TINT);
  ctx.textAlign="right"; ctx.textBaseline="bottom";
  ctx.fillStyle=R.accent; ctx.font=`800 ${S*18}px 'DM Sans',sans-serif`;
  ctx.fillText("HOOPSMATIC", W-m-S*14, H*0.97-S*14);
  ctx.restore();
}
function drawTopTeammates(ctx, R, p, x0, x1, y0, tint){
  const G=R.geom, S=G.S, list=R.agg[p.name];
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle=COL.sec; ctx.font=`700 ${S*15}px 'DM Sans',sans-serif`; ctx.fillText("TOP TEAMMATES", x0, y0);
  const top=list.slice(0,3), rowH=S*64, chipR=S*22;
  top.forEach((e,i)=>{
    const ty=y0+S*16+i*rowH, cy=ty+rowH*0.45;
    drawHead(ctx, R.heads[e.name]||null, x0+chipR, cy, chipR, tint, e.name);
    const tx=x0+chipR*2+S*12, ptsTxt=fmtPts(e.pts);
    ctx.textAlign="right"; ctx.fillStyle=tint; ctx.font=numFont(S*24);
    const pw=ctx.measureText(ptsTxt).width; ctx.fillText(ptsTxt,x1,cy-S*2);
    ctx.textAlign="left"; ctx.fillStyle=COL.text; ctx.font=nameFont(S*21);
    ctx.save(); fitText(ctx,e.name,x1-tx-pw-S*12); ctx.fillText(e.name,tx,cy-S*6); ctx.restore();
    ctx.fillStyle=COL.sec; ctx.font=nameFont(S*15);
    ctx.save(); fitText(ctx,e.marquee,x1-tx-S*4); ctx.fillText(e.marquee,tx,cy+S*16); ctx.restore();
  });
  const others=list.slice(3);
  if(others.length){
    const op=others.reduce((a,e)=>a+e.pts,0), ty=y0+S*16+3*rowH+S*6;
    ctx.fillStyle=COL.sec; ctx.font=nameFont(S*16); ctx.fillText(`+ ${others.length} others · ${fmtPts(op)}`, x0, ty);
  }
}

/* ============================================================
   PREPARE  (shared by preview / mp4 / webm)
   ============================================================ */
async function prepare(){
  const pA = BY_NAME[$("pa").value], pB = BY_NAME[$("pb").value];
  if(!pA || !pB) throw new Error("Pick two valid players.");
  if(pA.name === pB.name) throw new Error("Pick two different players.");
  const opts = getOpts();
  const geom = buildGeom(opts);
  const plan = buildPlan(pA, pB);
  const doc = buildDocument(plan, geom);
  if(!doc.rows.length) throw new Error("No decorated teammates to show for this matchup.");
  const { perItem, scrollSec } = pacing(plan);

  $("status").textContent = "Loading headshots…";
  const heads = await preloadHeads(involvedNames(pA,pB), (d,n)=>{
    $("status").textContent = `Loading headshots… ${d}/${n}`; setBar(d/n*0.15);
  });
  await document.fonts.ready;

  const cv = $("preview"); cv.width = opts.w; cv.height = opts.h;
  const fps = opts.fps;
  const introF = Math.round(INTRO_SEC*fps);
  const scrollF = Math.max(1, Math.round(scrollSec*fps));
  const transF = Math.round(TRANS_SEC*fps);
  const finalF = Math.round(FINAL_SEC*fps);
  const total = introF + scrollF + transF + finalF;

  // Build the scroll timeline: one waypoint per reveal slot / career-over card /
  // empty season. Camera reaches each waypoint's scrollPx at its scheduled time.
  const { wps } = buildSchedule(plan, perItem);
  const tl = [], anchorTimes=[], bigCross={A:[],B:[]};
  for(const w of wps){
    const block = doc.blocks[w.bi];
    if(w.kind==="beat"){
      const an = block.anchors[w.ai];
      an.time = w.time;
      for(const r of an.rows){ r.crossTime = w.time; if(r.points>=4) bigCross[r.side].push(w.time); }
      anchorTimes.push(w.time);
      tl.push({ time:w.time, scrollPx:an.fire, beat:true, side:an.side });
    } else {
      tl.push({ time:w.time, scrollPx:block.centerFire, beat:false, side:null });
    }
  }
  const band = geom.rowH, settleAdvance = geom.rowH*1.3;
  const lerp = (a,b,t)=>a+(b-a)*t;
  const easeIO = t => t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  function scrollPxAt(ts){
    if(!tl.length) return 0;
    const first = tl[0];
    if(ts <= first.time) return lerp(first.scrollPx - band, first.scrollPx, easeIO(clamp(ts/first.time,0,1)));
    for(let i=0;i<tl.length-1;i++){
      if(ts <= tl[i+1].time){
        const f = (ts - tl[i].time)/(tl[i+1].time - tl[i].time);
        return lerp(tl[i].scrollPx, tl[i+1].scrollPx, easeIO(f));
      }
    }
    const last = tl[tl.length-1];
    return lerp(last.scrollPx, last.scrollPx + settleAdvance, clamp((ts-last.time)/SETTLE_SEC,0,1));
  }
  const scrollEndPx = scrollPxAt(scrollSec);
  function tally(scrollPx){
    let vA=0, vB=0;
    for(const r of doc.rows){ const f = clamp((scrollPx - (r.fire - band))/band, 0, 1);
      if(f<=0) continue; if(r.side==="A") vA+=r.points*f; else vB+=r.points*f; }
    return [vA, vB];
  }
  function activeAt(ts){
    let best=null, bd=1e9;
    for(const w of tl){ if(!w.beat) continue; const d=Math.abs(ts-w.time); if(d<bd){ bd=d; best=w.side; } }
    return bd<0.4 ? best : null;
  }

  const R = { geom, accent:opts.accent, title:opts.title, explainer:opts.explainer, pA, pB, doc, heads,
              imgA:heads[pA.name]||null, imgB:heads[pB.name]||null,
              agg:{ [pA.name]:aggregate(pA), [pB.name]:aggregate(pB) },
              anchorTimes, bigCross, ts:null, activeSide:null };

  const ctx = cv.getContext("2d");
  function drawFrame(g){
    if(g < introF){ R.ts=null; R.activeSide=null; drawIntro(ctx, R, g/introF); return; }
    if(g < introF + scrollF){
      const ts = (g - introF)/fps; R.ts = ts; R.activeSide = activeAt(ts);
      const scrollPx = scrollPxAt(ts); const [vA,vB] = tally(scrollPx);
      drawScrollFrame(ctx, R, scrollPx, vA, vB); return;
    }
    if(g < introF + scrollF + transF){
      const tp = easeOutCubic((g - introF - scrollF)/transF);
      R.ts = scrollSec; R.activeSide = null;
      const [vA,vB] = tally(scrollEndPx);
      drawScrollFrame(ctx, R, scrollEndPx, vA, vB);   // frozen last scroll frame
      drawFinalCard(ctx, R, tp);                       // finale fades in over it
      return;
    }
    R.ts=null; R.activeSide=null; drawFinalCard(ctx, R, 1);
  }

  return { opts, fps, total, drawFrame, cv,
           totalSec: INTRO_SEC + scrollSec + TRANS_SEC + FINAL_SEC, rows: doc.rows.length };
}


/* ============================================================
   PREVIEW / MP4 / WEBM
   ============================================================ */
async function runPreview(){
  if(busy) return; busy=true; setBusy(true);
  try{
    const P = await prepare();
    $("status").textContent = `Preview · ${P.totalSec.toFixed(1)}s · ${P.total} frames · ${P.rows} rows`;
    const frameDelay = 1000/P.fps; let g=0;
    await new Promise(res=>{ (function step(){
      P.drawFrame(g); setBar(g/P.total); g++;
      if(g>=P.total){ setBar(1); res(); return; }
      setTimeout(step, frameDelay);
    })(); });
    $("status").textContent = "Preview done.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

async function renderMP4(){
  if(busy) return; busy=true; setBusy(true);
  try{
    if(!("VideoEncoder" in window)) throw new Error("WebCodecs not supported — use WebM.");
    const P = await prepare();
    const { opts, fps, total, drawFrame, cv } = P;
    const muxer = new Mp4Muxer.Muxer({
      target: new Mp4Muxer.ArrayBufferTarget(),
      fastStart: "in-memory",
      video: { codec:"avc", width:opts.w, height:opts.h }
    });
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: e => { console.error(e); $("status").textContent = "Encoder error: "+e.message; }
    });
    encoder.configure({ codec:"avc1.4d0034", width:opts.w, height:opts.h, bitrate:8_000_000, framerate:fps });
    $("status").textContent = "Encoding MP4…";
    const usPerFrame = 1e6/fps;
    for(let g=0; g<total; g++){
      drawFrame(g);
      const vf = new VideoFrame(cv, { timestamp: Math.round(g*usPerFrame), duration: Math.round(usPerFrame) });
      encoder.encode(vf, { keyFrame: g % (fps*2) === 0 });
      vf.close();
      setBar(g/total); $("status").textContent = `Encoding MP4… ${Math.round(100*g/total)}%`;
      if(encoder.encodeQueueSize > 8) await new Promise(r=>setTimeout(r,0));
      else if(g % 4 === 0) await new Promise(r=>setTimeout(r,0));
    }
    await encoder.flush(); muxer.finalize();
    offerDownload("dl-mp4", new Blob([muxer.target.buffer], {type:"video/mp4"}), fileName("mp4"));
    setBar(1); $("status").textContent = "MP4 ready.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

async function renderWebM(){
  if(busy) return; busy=true; setBusy(true);
  try{
    const P = await prepare();
    const { fps, total, drawFrame, cv } = P;
    const stream = cv.captureStream(fps);
    let mime = "video/webm;codecs=vp9";
    if(!MediaRecorder.isTypeSupported(mime)) mime = "video/webm;codecs=vp8";
    if(!MediaRecorder.isTypeSupported(mime)) mime = "video/webm";
    const rec = new MediaRecorder(stream, { mimeType:mime, videoBitsPerSecond:8_000_000 });
    const chunks = []; rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
    const done = new Promise(res => rec.onstop = res); rec.start();
    $("status").textContent = "Recording WebM…";
    const frameDelay = 1000/fps; let g=0;
    await new Promise(res=>{ (function step(){
      drawFrame(g); setBar(g/total); $("status").textContent = `Recording WebM… ${Math.round(100*g/total)}%`;
      g++; if(g>=total){ res(); return; } setTimeout(step, frameDelay);
    })(); });
    rec.stop(); await done;
    offerDownload("dl-webm", new Blob(chunks, {type:"video/webm"}), fileName("webm"));
    setBar(1); $("status").textContent = "WebM ready.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

/* ---------- helpers ---------- */
function fileName(ext){
  const a = $("pa").value.replace(/\s+/g,"-").toLowerCase();
  const b = $("pb").value.replace(/\s+/g,"-").toLowerCase();
  return `teammates-${a}-vs-${b}.${ext}`;
}
function offerDownload(id, blob, name){
  const a = $(id); if(a.href) URL.revokeObjectURL(a.href);
  a.href = URL.createObjectURL(blob); a.download = name;
  a.textContent = `Download ${name.split(".").pop().toUpperCase()}`;
  a.style.display = "inline-flex"; $("downloads").style.display = "flex";
}
function setBar(p){ $("bar").style.width = (clamp(p,0,1)*100).toFixed(1)+"%"; }
function setBusy(b){ ["preview-btn","mp4-btn","webm-btn"].forEach(id=>$(id).disabled=b); }

/* ---------- wiring ---------- */
$("preview-btn").onclick = runPreview;
$("mp4-btn").onclick = renderMP4;
$("webm-btn").onclick = renderWebM;
["pa","pb","res","fps","dur","perItem","title","explainer","accent"].forEach(id=>{
  $(id).addEventListener("change", ()=>{ refreshMeta(); document.documentElement.style.setProperty("--accent", $("accent").value); });
  $(id).addEventListener("input",  ()=>{ if(id==="accent") document.documentElement.style.setProperty("--accent", $("accent").value); });
});
$("gran").querySelectorAll("button").forEach(btn=>{
  btn.onclick = ()=>{ $("gran").querySelectorAll("button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on"); granularity = btn.dataset.g; refreshMeta(); };
});

boot();
</script>
