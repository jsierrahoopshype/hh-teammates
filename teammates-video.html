<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teammates Score — Head-to-Head Video Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@latest/build/mp4-muxer.js"></script>
<style>
  :root{
    --bg:#0d0f14; --panel:#151922; --text:#f5f5f7; --accent:#3b82f6;
    --sec:#8a93a6; --gold:#caa23a; --line:#222836;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
  header .mark{font-weight:800;color:var(--accent);letter-spacing:1px;font-size:13px;margin-left:auto}
  .wrap{display:flex;gap:22px;padding:22px;flex-wrap:wrap;align-items:flex-start}
  .controls{flex:0 0 360px;max-width:100%;display:flex;flex-direction:column;gap:14px}
  .stage{flex:1 1 480px;min-width:320px;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--sec);font-weight:700}
  label{display:block;font-size:12px;color:var(--sec);margin:10px 0 5px;font-weight:600}
  input[type=text],select,input[type=number]{
    width:100%;background:#0e1219;border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:10px 11px;font-family:inherit;font-size:14px;
  }
  input[type=color]{width:46px;height:34px;border:1px solid var(--line);border-radius:8px;background:#0e1219;padding:2px;vertical-align:middle}
  .row{display:flex;gap:10px}
  .row>*{flex:1}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;background:#0e1219;color:var(--sec);border:none;padding:9px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 14px;font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;width:100%}
  .btn.ghost{background:#0e1219;border:1px solid var(--line);color:var(--text)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btns{display:flex;gap:10px;margin-top:6px}
  canvas#preview{width:100%;background:#000;border-radius:14px;border:1px solid var(--line);display:block}
  .progress{height:10px;background:#0e1219;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .1s linear}
  .meta{font-size:12px;color:var(--sec);line-height:1.5}
  .meta b{color:var(--text)}
  .pill{display:inline-block;background:#0e1219;border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:11px;color:var(--sec);margin:2px 4px 0 0}
  a{color:var(--accent)}
</style>
</head>
<body>
<header>
  <h1>Teammates Score — Head-to-Head Video</h1>
  <span class="mark">HOOPSMATIC</span>
</header>

<div class="wrap">
  <!-- ============ CONTROLS ============ -->
  <div class="controls">
    <div class="card">
      <h2>Matchup</h2>
      <label>Player A</label>
      <input type="text" id="pa" list="playerlist" placeholder="Search player…" autocomplete="off">
      <label>Player B</label>
      <input type="text" id="pb" list="playerlist" placeholder="Search player…" autocomplete="off">
      <datalist id="playerlist"></datalist>
      <div id="matchmeta" class="meta" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <h2>Format</h2>
      <label>Resolution</label>
      <select id="res">
        <option value="1920x1080">1920 × 1080 (landscape)</option>
        <option value="1280x720">1280 × 720 (landscape)</option>
        <option value="1080x1080" selected>1080 × 1080 (square)</option>
        <option value="1080x1920">1080 × 1920 (portrait)</option>
      </select>
      <div class="row">
        <div>
          <label>FPS</label>
          <select id="fps">
            <option value="24">24</option>
            <option value="30">30</option>
            <option value="60" selected>60</option>
          </select>
        </div>
        <div>
          <label>Target duration</label>
          <select id="dur">
            <option value="auto" selected>Auto (~60s)</option>
            <option value="30">~30s</option>
            <option value="45">~45s</option>
            <option value="90">~90s</option>
            <option value="manual">Manual / reveal</option>
          </select>
        </div>
      </div>
      <label>Seconds per reveal (override) — blank = auto</label>
      <input type="number" id="perItem" step="0.05" min="0.2" max="3" placeholder="auto">
      <label>Granularity</label>
      <div class="seg" id="gran">
        <button data-g="accolade" class="on">Per accolade</button>
        <button data-g="season">Per teammate-season</button>
      </div>
    </div>

    <div class="card">
      <h2>Style</h2>
      <label>Title line</label>
      <input type="text" id="title" value="Who had more help?">
      <label>Accent color</label>
      <input type="color" id="accent" value="#3b82f6">
      <span class="meta" style="margin-left:8px">Winner shown in this color.</span>
    </div>

    <div class="card">
      <h2>Render</h2>
      <button class="btn" id="preview-btn">▶ Preview animation</button>
      <div class="btns">
        <button class="btn" id="mp4-btn">⬇ Render MP4</button>
        <button class="btn ghost" id="webm-btn">⬇ Render WebM</button>
      </div>
      <div class="progress" style="margin-top:12px"><i id="bar"></i></div>
      <div id="status" class="meta" style="margin-top:8px">Idle.</div>
      <div class="btns" id="downloads" style="display:none">
        <a id="dl-mp4" class="btn" download style="display:none">Download MP4</a>
        <a id="dl-webm" class="btn ghost" download style="display:none">Download WebM</a>
      </div>
    </div>
  </div>

  <!-- ============ STAGE ============ -->
  <div class="stage">
    <canvas id="preview" width="1080" height="1080"></canvas>
    <div id="timeline" class="meta"></div>
  </div>
</div>

<script>
/* ============================================================
   Teammates Score — Head-to-Head video generator (standalone)
   Career-aligned scrolling timeline + share-card freeze frame.
   ============================================================ */
const DATA_URL   = "data/teammates.json";
const IDS_URL    = "data/headshot_ids.json";
const HEADSHOT_BASE = "https://jsierrahoopshype.github.io/nba-headshots/players/headshots/face/";
const PROXY_BASE    = "https://nba-battle.thejorgesierra.workers.dev/nba-headshot/";

const COL = { bg:"#0d0f14", panel:"#151922", text:"#f5f5f7", sec:"#8a93a6", gold:"#caa23a" };
const SIDE_B_TINT = "#ef6a5a";                 // warm tint for player B
const AWARD_LABEL = {
  "Most Valuable Player":"MVP",
  "All-NBA First Team":"All-NBA 1st Team","All-NBA Second Team":"All-NBA 2nd Team","All-NBA Third Team":"All-NBA 3rd Team",
  "All-Defensive First Team":"All-Defensive 1st Team","All-Defensive Second Team":"All-Defensive 2nd Team",
  "All-Rookie First Team":"All-Rookie 1st Team","All-Rookie Second Team":"All-Rookie 2nd Team"
};
const INTRO_SEC = 2.5, FINAL_SEC = 5;

let DB=null, BY_NAME={}, SCORES={}, TEAMS={}, HEADSHOT_IDS={};
let granularity = "accolade";
let busy = false;

const $ = id => document.getElementById(id);
const awLabel = a => AWARD_LABEL[a] || a;
const teamFull = t => (t && (TEAMS[t]||t)) || "";
const seasonCal = y => y;                        // calendar year as-is
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const fmt1 = n => n.toFixed(1);
const fmtPts = n => { const r = Math.round(n*1000)/1000; return r%1===0 ? r.toString() : parseFloat(r.toFixed(3)).toString(); };

/* normalize a name the same way build_teammates.py / the site tools do:
   NFKD -> ascii -> lowercase -> non-alphanumeric collapsed to spaces -> trim */
function normName(s){
  return s.normalize("NFKD").replace(/[̀-ͯ]/g,"").toLowerCase()
          .replace(/[^a-z0-9]+/g," ").trim();
}

/* ---------- boot ---------- */
async function boot(){
  try{
    const [dRes, idRes] = await Promise.all([
      fetch(DATA_URL, {cache:"no-cache"}),
      fetch(IDS_URL,  {cache:"no-cache"}).catch(()=>null)
    ]);
    DB = await dRes.json();
    SCORES = DB.scores; TEAMS = DB.teams || {};
    DB.players.forEach(p => BY_NAME[p.name] = p);
    if(idRes && idRes.ok){ try{ HEADSHOT_IDS = await idRes.json(); }catch(e){ HEADSHOT_IDS = {}; } }
    const dl = $("playerlist");
    const names = DB.players.map(p=>p.name).sort();
    dl.innerHTML = names.map(n=>`<option value="${n.replace(/"/g,'&quot;')}">`).join("");
    $("pa").value = BY_NAME["Michael Jordan"] ? "Michael Jordan" : names[0];
    $("pb").value = BY_NAME["LeBron James"]   ? "LeBron James"   : names[1];
    refreshMeta();
  }catch(e){
    $("status").textContent = "Could not load data/teammates.json — serve this file from the deployed site.";
    console.error(e);
  }
}

/* ============================================================
   HEADSHOT RESOLUTION  (hs file -> proxy id -> initials)
   ============================================================ */
function headshotURL(name){
  const rec = BY_NAME[name];
  if(rec && rec.hs) return HEADSHOT_BASE + rec.hs;          // (a) deployed face crop
  const id = HEADSHOT_IDS[normName(name)];
  if(id != null) return PROXY_BASE + id;                     // (b) CORS proxy by NBA id
  return null;                                               // (c) initials fallback
}
const urlCache = {};                 // url -> Promise<Image|null>
function loadImg(url){
  if(!url) return Promise.resolve(null);
  if(urlCache[url]) return urlCache[url];
  urlCache[url] = new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = url;
  });
  return urlCache[url];
}
/* preload every headshot a render will need; returns name -> Image|null */
async function preloadHeads(names, onProgress){
  const uniq = [...new Set(names)];
  const map = {};
  let done = 0;
  await Promise.all(uniq.map(async nm => {
    map[nm] = await loadImg(headshotURL(nm));
    done++; if(onProgress) onProgress(done, uniq.length);
  }));
  return map;
}

/* ============================================================
   DATA MODEL
   ============================================================ */
const _byYear = new WeakMap();
function byYear(p){
  if(_byYear.has(p)) return _byYear.get(p);
  const m = {}; for(const s of p.detail) m[s.y] = s; _byYear.set(p, m); return m;
}
/* rows for one season's decorated mates on one side */
function seasonRows(entry, side){
  if(!entry) return [];
  const out = [];
  for(const mate of entry.mates){
    if(granularity === "accolade"){
      for(const a of mate.a) out.push({ side, teammate:mate.n, awards:[a], points:(SCORES[a]||0) });
    } else {
      let pts=0; for(const a of mate.a) pts += (SCORES[a]||0);
      out.push({ side, teammate:mate.n, awards:mate.a.slice(), points:pts });
    }
  }
  return out;
}
function countItems(pA,pB){
  let c=0;
  for(const p of [pA,pB]) for(const s of p.detail)
    c += (granularity==="accolade" ? s.mates.reduce((a,m)=>a+m.a.length,0) : s.mates.length);
  return c;
}
/* every teammate that will appear (for preload) */
function involvedNames(pA,pB){
  const set = new Set([pA.name, pB.name]);
  for(const p of [pA,pB]) for(const s of p.detail) for(const m of s.mates) set.add(m.n);
  return [...set];
}
/* aggregate a player's teammates for the final card */
function aggregate(p){
  const m = {};
  for(const s of p.detail) for(const mate of s.mates){
    const e = m[mate.n] || (m[mate.n] = { name:mate.n, pts:0, aw:{} });
    e.pts += mate.p;
    for(const a of mate.a) e.aw[a] = (e.aw[a]||0) + 1;
  }
  const list = Object.values(m).sort((a,b)=> b.pts - a.pts || a.name.localeCompare(b.name));
  list.forEach(e => e.marquee = marqueeAccolades(e.aw));
  return list;
}
function marqueeAccolades(aw){
  const items = Object.keys(aw).sort((x,y)=> (SCORES[y]||0)-(SCORES[x]||0) || aw[y]-aw[x]);
  return items.slice(0,2).map(a => (aw[a]>1 ? `${aw[a]}× ` : "") + awLabel(a)).join(" · ");
}

/* ---------- pacing ---------- */
function pacing(itemCount){
  const durSel = $("dur").value;
  const manual = parseFloat($("perItem").value);
  let perItem;
  if(!isNaN(manual) && manual>0)      perItem = manual;
  else if(durSel === "manual")        perItem = 0.7;
  else { const target = durSel==="auto" ? 60 : parseFloat(durSel);
         perItem = clamp(target / Math.max(itemCount,1), 0.35, 1.2); }
  const scrollSec = Math.max(itemCount,1) * perItem;
  const total = INTRO_SEC + scrollSec + FINAL_SEC;
  return { perItem, scrollSec, total };
}
function getOpts(){
  const [w,h] = $("res").value.split("x").map(Number);
  return { w, h, fps: parseInt($("fps").value, 10),
           accent: $("accent").value || "#3b82f6", title: $("title").value || "" };
}
function refreshMeta(){
  const pA = BY_NAME[$("pa").value], pB = BY_NAME[$("pb").value];
  if(!pA || !pB){ $("matchmeta").innerHTML = "Pick two players."; $("timeline").textContent=""; return; }
  const n = countItems(pA,pB);
  const { perItem, scrollSec, total } = pacing(n);
  $("matchmeta").innerHTML =
    `<b>${pA.name}</b> — ${pA.score} · ${pA.perSeason}/season · ${pA.seasons} seasons · ${pA.rings}🏆<br>`+
    `<b>${pB.name}</b> — ${pB.score} · ${pB.perSeason}/season · ${pB.seasons} seasons · ${pB.rings}🏆`;
  $("timeline").innerHTML =
    `<span class="pill">${n} rows</span>`+
    `<span class="pill">${perItem.toFixed(2)}s / reveal</span>`+
    `<span class="pill">scroll ${scrollSec.toFixed(1)}s</span>`+
    `<span class="pill">≈ ${total.toFixed(1)}s total</span>`+
    (total>60 ? `<span class="pill">dense — runs long for readability</span>`:"");
}

/* ============================================================
   GEOMETRY
   ============================================================ */
function buildGeom(opts){
  const W=opts.w, H=opts.h, S=Math.min(W,H)/1080;
  const sbH = Math.min(Math.max(H*0.18, S*200), H*0.30);
  const viewportTop = sbH, viewportH = H - sbH;
  const fireLineY = sbH + viewportH*0.45;
  const revealBand = viewportH*0.32;
  const gutter = S*16;
  const leftColX0 = W*0.045, leftColX1 = W*0.5 - gutter;
  const rightColX0 = W*0.5 + gutter, rightColX1 = W*0.955;
  const rowH = S*78, headerH = S*94, blockGap = S*22;
  const chipR = rowH*0.34;
  return { W,H,S, sbH, viewportTop, viewportH, fireLineY, revealBand,
           leftColX0,leftColX1,rightColX0,rightColX1, rowH, headerH, blockGap, chipR };
}

/* build the scrolling document of career-aligned season blocks */
function buildDocument(pA,pB,geom){
  const { rowH, headerH, blockGap, viewportTop, fireLineY } = geom;
  const dA = byYear(pA), dB = byYear(pB);
  const maxN = Math.max(pA.years.length, pB.years.length);
  const blocks = [], rows = [];
  let docY = 0;
  for(let n=1; n<=maxN; n++){
    const yA = n<=pA.years.length ? pA.years[n-1] : null;
    const yB = n<=pB.years.length ? pB.years[n-1] : null;
    const eA = yA!=null ? dA[yA] : undefined;
    const eB = yB!=null ? dB[yB] : undefined;
    const rowsA = seasonRows(eA,"A"), rowsB = seasonRows(eB,"B");
    const aOver = yA==null, bOver = yB==null;
    // skip a career-season index entirely when neither side has decorated teammates to show
    if(rowsA.length===0 && rowsB.length===0) continue;
    const slotsA = aOver ? 1 : (rowsA.length || 1);
    const slotsB = bOver ? 1 : (rowsB.length || 1);
    const bodyH = Math.max(slotsA, slotsB) * rowH;
    const top = docY, bodyTop = top + headerH;
    rowsA.forEach((r,i)=>{ r.centerDoc = bodyTop + i*rowH + rowH/2; r.fire = r.centerDoc-(fireLineY-viewportTop); rows.push(r); });
    rowsB.forEach((r,i)=>{ r.centerDoc = bodyTop + i*rowH + rowH/2; r.fire = r.centerDoc-(fireLineY-viewportTop); rows.push(r); });
    blocks.push({ n, top, headerH, bodyH, yA, yB,
                  teamA: eA?eA.t:null, teamB: eB?eB.t:null, aOver, bOver, rowsA, rowsB,
                  height: headerH + bodyH + blockGap });
    docY += headerH + bodyH + blockGap;
  }
  return { blocks, rows, docHeight: docY, maxN };
}

/* ============================================================
   DRAWING PRIMITIVES
   ============================================================ */
function rr(ctx,x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);     ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
const nameFont = s => `600 ${s}px 'DM Sans',sans-serif`;
const numFont  = s => `700 ${s}px 'JetBrains Mono',monospace`;
function fitText(ctx, text, max){
  const m = ctx.font.match(/^(.*?)(\d+(?:\.\d+)?)px(.*)$/);
  if(!m) return;
  const pre=m[1], post=m[3]; let size=parseFloat(m[2]);
  while(size>8 && ctx.measureText(text).width>max){ size-=1; ctx.font = `${pre}${size}px${post}`; }
}
const PALETTE = ["#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6","#ec4899","#14b8a6","#f97316"];
function colorFor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))>>>0; return PALETTE[h%PALETTE.length]; }
function drawHead(ctx, img, cx, cy, r, ringColor, name){
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.closePath();
  if(img){
    ctx.clip();
    const iw=img.naturalWidth, ih=img.naturalHeight, side=Math.min(iw,ih);
    ctx.drawImage(img,(iw-side)/2,(ih-side)/2,side,side, cx-r,cy-r,r*2,r*2);
  } else {
    ctx.fillStyle="#1b2130"; ctx.fill();
    ctx.fillStyle=colorFor(name||"?"); ctx.globalAlpha=.35; ctx.fill(); ctx.globalAlpha=1;
    const parts=(name||"?").split(/\s+/);
    const ini=((parts[0]||" ")[0]+(parts.length>1?parts[parts.length-1][0]:"")).toUpperCase();
    ctx.fillStyle=COL.text; ctx.font=nameFont(r*0.9);
    ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(ini,cx,cy+r*0.04);
  }
  ctx.restore();
  if(ringColor){ ctx.lineWidth=Math.max(2,r*0.07); ctx.strokeStyle=ringColor;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); }
}

/* ============================================================
   FIXED TOP SCOREBOARD
   ============================================================ */
function drawTopScoreboard(ctx, R, valA, valB){
  const { W, S, sbH } = R.geom, accent = R.accent;
  // band background
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,sbH);
  ctx.strokeStyle = "#1c2230"; ctx.lineWidth = Math.max(1,S*2);
  ctx.beginPath(); ctx.moveTo(0,sbH-1); ctx.lineTo(W,sbH-1); ctx.stroke();

  const r = sbH*0.26, cy = sbH*0.40;
  const leftX = W*0.20, rightX = W*0.80;
  const aLead = valA > valB + 1e-9, bLead = valB > valA + 1e-9;

  drawScorePanel(ctx, R, leftX, cy, r, R.imgA, R.pA.name, valA, aLead?accent:COL.sec);
  drawScorePanel(ctx, R, rightX, cy, r, R.imgB, R.pB.name, valB, bLead?accent:COL.sec);

  // centre gap column
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*18); ctx.fillText("GAP", W/2, cy - r*0.35);
  ctx.fillStyle = accent;  ctx.font = numFont(S*46);  ctx.fillText(fmt1(Math.abs(valA-valB)), W/2, cy + r*0.30);
  const leader = aLead ? R.pA.name : bLead ? R.pB.name : "even";
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*16);
  ctx.save(); fitText(ctx, leader==="even"?"all square":`${leader} leads`, W*0.22);
  ctx.fillText(leader==="even"?"all square":`${leader} leads`, W/2, cy + r*0.78); ctx.restore();
}
function drawScorePanel(ctx, R, cx, cy, r, img, name, val, numColor){
  const S = R.geom.S;
  drawHead(ctx, img, cx, cy, r, R.activeSide===(cx<R.geom.W/2?"A":"B")?R.accent:"#2a3142", name);
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle = COL.text; ctx.font = nameFont(S*22);
  ctx.save(); fitText(ctx, name, r*3.4); ctx.fillText(name, cx, cy + r + S*26); ctx.restore();
  ctx.fillStyle = numColor; ctx.font = numFont(S*42);
  ctx.fillText(fmt1(val), cx, cy + r + S*70);
}
function drawChrome(ctx, R){
  const { W,H,S } = R.geom;
  if(R.title){
    ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillStyle = COL.sec; ctx.font = nameFont(S*16);
    ctx.fillText(R.title.toUpperCase(), W/2, S*8);
  }
  ctx.textAlign="right"; ctx.textBaseline="bottom";
  ctx.fillStyle = R.accent; ctx.font = `800 ${S*16}px 'DM Sans',sans-serif`;
  ctx.fillText("HOOPSMATIC", W - S*18, H - S*16);
}

/* ============================================================
   SCROLLING DOCUMENT
   ============================================================ */
function drawScrollFrame(ctx, R, scrollPx, valA, valB){
  const G = R.geom;
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,G.W,G.H);

  // document (clipped to the area below the scoreboard)
  ctx.save();
  ctx.beginPath(); ctx.rect(0, G.viewportTop, G.W, G.viewportH); ctx.clip();
  for(const block of R.doc.blocks){
    const screenTop = G.viewportTop + (block.top - scrollPx);
    if(screenTop > G.H || screenTop + block.height < G.viewportTop) continue;
    drawBlock(ctx, R, block, screenTop, scrollPx);
  }
  ctx.restore();

  drawTopScoreboard(ctx, R, valA, valB);
  drawChrome(ctx, R);
}
function edgeAlpha(G, top, h){
  const aIn  = clamp((G.H - top)/(G.S*70), 0, 1);
  const aOut = clamp((top + h - G.viewportTop)/(G.S*70), 0, 1);
  return Math.min(aIn, aOut);
}
function revealAlpha(G, centerScreen){
  if(centerScreen <= G.fireLineY) return clamp((centerScreen - G.viewportTop)/(G.S*55), 0, 1);
  return clamp(1 - (centerScreen - G.fireLineY)/G.revealBand, 0, 1);
}
function drawBlock(ctx, R, block, screenTop, scrollPx){
  const G = R.geom, S = G.S;
  // ---- header band ----
  const hAlpha = edgeAlpha(G, screenTop, block.headerH);
  if(hAlpha > 0.01){
    ctx.save(); ctx.globalAlpha = hAlpha;
    ctx.fillStyle = "#11151d"; ctx.fillRect(0, screenTop, G.W, block.headerH);
    ctx.strokeStyle = "#1c2230"; ctx.lineWidth = Math.max(1,S*1.5);
    ctx.beginPath(); ctx.moveTo(0, screenTop+block.headerH-0.5); ctx.lineTo(G.W, screenTop+block.headerH-0.5); ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillStyle = COL.sec; ctx.font = `800 ${S*22}px 'DM Sans',sans-serif`;
    ctx.fillText(`SEASON ${block.n}`, G.W/2, screenTop + S*14);
    // per-side sub-line: year · team
    ctx.font = nameFont(S*17);
    const subY = screenTop + S*52;
    if(!block.aOver){
      ctx.fillStyle = R.accent;
      const t = `${seasonCal(block.yA)}${block.teamA?" · "+teamFull(block.teamA):""}`;
      const cx = (G.leftColX0+G.leftColX1)/2; ctx.save(); fitText(ctx,t,G.leftColX1-G.leftColX0); ctx.fillText(t,cx,subY); ctx.restore();
    }
    if(!block.bOver){
      ctx.fillStyle = SIDE_B_TINT;
      const t = `${seasonCal(block.yB)}${block.teamB?" · "+teamFull(block.teamB):""}`;
      const cx = (G.rightColX0+G.rightColX1)/2; ctx.save(); fitText(ctx,t,G.rightColX1-G.rightColX0); ctx.fillText(t,cx,subY); ctx.restore();
    }
    ctx.restore();
  }
  // ---- centre divider ----
  ctx.save(); ctx.globalAlpha = edgeAlpha(G, screenTop, block.height)*0.5;
  ctx.strokeStyle = "#1c2230"; ctx.lineWidth = Math.max(1,S*1.5);
  ctx.beginPath(); ctx.moveTo(G.W/2, Math.max(screenTop+block.headerH, G.viewportTop));
  ctx.lineTo(G.W/2, Math.min(screenTop+block.height, G.H)); ctx.stroke(); ctx.restore();

  // ---- bodies ----
  const bodyTop = screenTop + block.headerH;
  drawColumn(ctx, R, block, "A", G.leftColX0, G.leftColX1, bodyTop, scrollPx);
  drawColumn(ctx, R, block, "B", G.rightColX0, G.rightColX1, bodyTop, scrollPx);
}
function drawColumn(ctx, R, block, side, x0, x1, bodyTop, scrollPx){
  const G = R.geom, S = G.S, rowH = G.rowH;
  const over = side==="A" ? block.aOver : block.bOver;
  const rows = side==="A" ? block.rowsA : block.rowsB;
  const tint = side==="A" ? R.accent : SIDE_B_TINT;

  if(over){
    // career-over marker (dimmed)
    const cy = bodyTop + rowH*0.5;
    const a = edgeAlpha(G, cy-rowH/2, rowH) * 0.6;
    if(a>0.01){
      const p = side==="A" ? R.pA : R.pB;
      ctx.save(); ctx.globalAlpha=a; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle = COL.sec; ctx.font = nameFont(S*18);
      ctx.fillText("career over", (x0+x1)/2, cy - S*10);
      ctx.fillStyle = "#5a6172"; ctx.font = numFont(S*16);
      ctx.fillText(`final ${fmtPts(p.score)}`, (x0+x1)/2, cy + S*16);
      ctx.restore();
    }
    return;
  }
  if(rows.length===0){
    // slim "no decorated teammates" row
    const cy = bodyTop + rowH*0.5;
    const a = edgeAlpha(G, cy-rowH/2, rowH)*0.5;
    if(a>0.01){
      ctx.save(); ctx.globalAlpha=a; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillStyle = "#5a6172"; ctx.font = nameFont(S*16);
      ctx.fillText("no decorated teammates", (x0+x1)/2, cy); ctx.restore();
    }
    return;
  }
  rows.forEach((r,i)=>{
    const ty = bodyTop + i*rowH;
    const centerScreen = G.viewportTop + (r.centerDoc - scrollPx);
    const alpha = revealAlpha(G, centerScreen);
    if(alpha <= 0.01) return;
    const slide = (1-alpha) * S*26;
    drawRow(ctx, R, r, x0, x1, ty + slide, alpha, tint);
  });
}
function drawRow(ctx, R, r, x0, x1, ty, alpha, tint){
  const G = R.geom, S = G.S, rowH = G.rowH, chipR = G.chipR;
  ctx.save(); ctx.globalAlpha = alpha;
  const cy = ty + rowH/2;
  const chipCx = x0 + chipR + S*4;
  drawHead(ctx, R.heads[r.teammate]||null, chipCx, cy, chipR, tint, r.teammate);

  const ptsTxt = "+" + fmtPts(r.points);
  ctx.textAlign="right"; ctx.textBaseline="middle";
  ctx.fillStyle = tint; ctx.font = numFont(S*30);
  const ptsW = ctx.measureText(ptsTxt).width;
  ctx.fillText(ptsTxt, x1, cy);

  const tx = chipCx + chipR + S*14;
  const textMax = x1 - tx - ptsW - S*14;
  ctx.textAlign="left";
  ctx.fillStyle = COL.text; ctx.font = nameFont(S*23);
  ctx.textBaseline="alphabetic";
  ctx.save(); fitText(ctx, r.teammate, textMax); ctx.fillText(r.teammate, tx, cy - S*4); ctx.restore();
  const labels = r.awards.map(awLabel).join(" · ");
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*17);
  ctx.save(); fitText(ctx, labels, textMax); ctx.fillText(labels, tx, cy + S*18); ctx.restore();
  ctx.restore();
}

/* ============================================================
   INTRO (VS) + FINAL SHARE CARD
   ============================================================ */
function drawIntro(ctx, R, prog){
  const G = R.geom, S = G.S, W=G.W, H=G.H;
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,H);
  drawChrome(ctx, R);
  ctx.globalAlpha = easeOutCubic(clamp(prog/0.5,0,1));
  const r = Math.min(W,H)*0.15, leftX=W*0.27, rightX=W*0.73, cy=H*0.38;
  drawHead(ctx, R.imgA, leftX, cy, r, R.accent, R.pA.name);
  drawHead(ctx, R.imgB, rightX, cy, r, SIDE_B_TINT, R.pB.name);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = R.accent; ctx.font = `800 ${S*64}px 'DM Sans',sans-serif`; ctx.fillText("VS", W/2, cy);
  ctx.fillStyle = COL.text; ctx.font = nameFont(S*28); ctx.textBaseline="alphabetic";
  ctx.save(); fitText(ctx, R.pA.name, r*2.4); ctx.fillText(R.pA.name, leftX, cy+r+S*42); ctx.restore();
  ctx.save(); ctx.font=nameFont(S*28); fitText(ctx, R.pB.name, r*2.4); ctx.fillText(R.pB.name, rightX, cy+r+S*42); ctx.restore();
  ctx.fillStyle = COL.gold; ctx.font = nameFont(S*18);
  ctx.fillText(R.pA.rings>0?`${R.pA.rings} ${R.pA.rings>1?"rings":"ring"}`:"no rings", leftX, cy+r+S*70);
  ctx.fillText(R.pB.rings>0?`${R.pB.rings} ${R.pB.rings>1?"rings":"ring"}`:"no rings", rightX, cy+r+S*70);
  // scoreboard 0.0–0.0
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*20); ctx.fillText("TEAMMATES SCORE", W/2, H*0.72);
  ctx.fillStyle = COL.sec; ctx.font = numFont(S*36);
  ctx.fillText("0.0", leftX, H*0.78); ctx.fillText("0.0", rightX, H*0.78);
  ctx.fillStyle = R.accent; ctx.font = numFont(S*40); ctx.fillText("0.0", W/2, H*0.785);
  ctx.globalAlpha = 1;
}

function drawFinalCard(ctx, R, prog){
  const G = R.geom, S = G.S, W=G.W, H=G.H;
  const A = R.pA, B = R.pB;
  const finalA = A.score, finalB = B.score;
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = easeOutCubic(clamp(prog/0.35,0,1));

  // panel
  const m = W*0.04;
  rr(ctx, m, H*0.03, W-2*m, H*0.94, S*26); ctx.fillStyle = COL.panel; ctx.fill();
  ctx.lineWidth = Math.max(1,S*2); ctx.strokeStyle = "#222a38"; ctx.stroke();

  const aWin = finalA >= finalB;
  const winner = aWin ? A : B, other = aWin ? B : A;
  const leftX = W*0.27, rightX = W*0.73, r = Math.min(W,H)*0.105, headCY = H*0.15;

  // heads + names + scores
  drawHead(ctx, R.imgA, leftX,  headCY, r, aWin?R.accent:"#2a3142", A.name);
  drawHead(ctx, R.imgB, rightX, headCY, r, aWin?"#2a3142":R.accent, B.name);
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle = COL.text; ctx.font = nameFont(S*26);
  ctx.save(); fitText(ctx, A.name, r*2.7); ctx.fillText(A.name, leftX, headCY+r+S*34); ctx.restore();
  ctx.save(); ctx.font=nameFont(S*26); fitText(ctx, B.name, r*2.7); ctx.fillText(B.name, rightX, headCY+r+S*34); ctx.restore();
  ctx.fillStyle = aWin?R.accent:COL.sec; ctx.font = numFont(S*54); ctx.fillText(fmtPts(finalA), leftX, headCY+r+S*88);
  ctx.fillStyle = aWin?COL.sec:R.accent; ctx.font = numFont(S*54); ctx.fillText(fmtPts(finalB), rightX, headCY+r+S*88);

  // gap + verdict
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*16); ctx.fillText("GAP", W/2, headCY - r*0.2);
  ctx.fillStyle = R.accent; ctx.font = numFont(S*40); ctx.fillText(fmt1(Math.abs(finalA-finalB)), W/2, headCY + r*0.35);
  ctx.fillStyle = COL.text; ctx.font = `800 ${S*36}px 'DM Sans',sans-serif`;
  ctx.save(); fitText(ctx, `${winner.name} had more help`, W*0.86);
  ctx.fillText(`${winner.name} had more help`, W/2, H*0.45); ctx.restore();
  ctx.fillStyle = COL.sec; ctx.font = nameFont(S*18);
  ctx.fillText(`${winner.perSeason}/season  vs  ${other.perSeason}/season`, W/2, H*0.485);

  // top teammates columns
  drawTopTeammates(ctx, R, A, W*0.06, W*0.47, H*0.55, R.accent);
  drawTopTeammates(ctx, R, B, W*0.53, W*0.94, H*0.55, SIDE_B_TINT);

  // wordmark
  ctx.textAlign="right"; ctx.textBaseline="bottom";
  ctx.fillStyle = R.accent; ctx.font = `800 ${S*18}px 'DM Sans',sans-serif`;
  ctx.fillText("HOOPSMATIC", W-m-S*14, H*0.97-S*14);
  ctx.globalAlpha = 1;
}
function drawTopTeammates(ctx, R, p, x0, x1, y0, tint){
  const G = R.geom, S = G.S;
  const list = R.agg[p.name];
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle = COL.sec; ctx.font = `700 ${S*15}px 'DM Sans',sans-serif`;
  ctx.fillText("TOP TEAMMATES", x0, y0);
  const top = list.slice(0,3);
  const rowH = S*64, chipR = S*22;
  top.forEach((e,i)=>{
    const ty = y0 + S*16 + i*rowH;
    const cy = ty + rowH*0.45;
    drawHead(ctx, R.heads[e.name]||null, x0+chipR, cy, chipR, tint, e.name);
    const tx = x0 + chipR*2 + S*12;
    const ptsTxt = fmtPts(e.pts);
    ctx.textAlign="right"; ctx.fillStyle = tint; ctx.font = numFont(S*24);
    const pw = ctx.measureText(ptsTxt).width; ctx.fillText(ptsTxt, x1, cy - S*2);
    ctx.textAlign="left";
    ctx.fillStyle = COL.text; ctx.font = nameFont(S*21);
    ctx.save(); fitText(ctx, e.name, x1 - tx - pw - S*12); ctx.fillText(e.name, tx, cy - S*6); ctx.restore();
    ctx.fillStyle = COL.sec; ctx.font = nameFont(S*15);
    ctx.save(); fitText(ctx, e.marquee, x1 - tx - S*4); ctx.fillText(e.marquee, tx, cy + S*16); ctx.restore();
  });
  const others = list.slice(3);
  if(others.length){
    const op = others.reduce((a,e)=>a+e.pts,0);
    const ty = y0 + S*16 + 3*rowH + S*6;
    ctx.fillStyle = COL.sec; ctx.font = nameFont(S*16);
    ctx.fillText(`+ ${others.length} others · ${fmtPts(op)}`, x0, ty);
  }
}

/* ============================================================
   PREPARE  (shared by preview / mp4 / webm)
   ============================================================ */
async function prepare(){
  const pA = BY_NAME[$("pa").value], pB = BY_NAME[$("pb").value];
  if(!pA || !pB) throw new Error("Pick two valid players.");
  if(pA.name === pB.name) throw new Error("Pick two different players.");
  const opts = getOpts();
  const geom = buildGeom(opts);
  const doc = buildDocument(pA, pB, geom);
  if(!doc.rows.length) throw new Error("No decorated teammates to show for this matchup.");
  const { perItem, scrollSec } = pacing(doc.rows.length);

  // preload every headshot before the frame loop
  $("status").textContent = "Loading headshots…";
  const heads = await preloadHeads(involvedNames(pA,pB), (d,n)=>{
    $("status").textContent = `Loading headshots… ${d}/${n}`; setBar(d/n*0.15);
  });
  await document.fonts.ready;

  const cv = $("preview"); cv.width = opts.w; cv.height = opts.h;
  const fps = opts.fps;
  const introF = Math.round(INTRO_SEC*fps);
  const scrollF = Math.max(1, Math.round(scrollSec*fps));
  const finalF  = Math.round(FINAL_SEC*fps);
  const total = introF + scrollF + finalF;

  const startPx = -geom.viewportH;
  const endPx   = doc.docHeight + (geom.fireLineY - geom.viewportTop) + geom.rowH*2;
  const scrollDistance = endPx - startPx;

  const R = {
    geom, accent: opts.accent, title: opts.title,
    pA, pB, doc, heads,
    imgA: heads[pA.name]||null, imgB: heads[pB.name]||null,
    agg: { [pA.name]: aggregate(pA), [pB.name]: aggregate(pB) },
    activeSide: null
  };

  function tally(scrollPx){
    let vA=0, vB=0;
    const band = geom.rowH;
    for(const r of doc.rows){
      const f = clamp((scrollPx - (r.fire - band))/band, 0, 1);
      if(f<=0) continue;
      if(r.side==="A") vA += r.points*f; else vB += r.points*f;
    }
    return [vA, vB];
  }
  function currentSide(scrollPx){
    // the side whose most-recent row is mid-reveal (for scoreboard ring glow)
    let best=null, bestD=Infinity;
    for(const r of doc.rows){
      const d = Math.abs(scrollPx - r.fire);
      if(d<bestD){ bestD=d; best=r.side; }
    }
    return bestD < geom.rowH ? best : null;
  }
  const ctx = cv.getContext("2d");
  function drawFrame(g){
    if(g < introF){ R.activeSide=null; drawIntro(ctx, R, g/introF); return; }
    if(g < introF + scrollF){
      const p = (g - introF)/scrollF;
      const scrollPx = startPx + p*scrollDistance;
      const [vA,vB] = tally(scrollPx);
      R.activeSide = currentSide(scrollPx);
      drawScrollFrame(ctx, R, scrollPx, vA, vB);
      return;
    }
    const p = clamp((g - introF - scrollF)/finalF, 0, 1);
    R.activeSide=null; drawFinalCard(ctx, R, p);
  }

  return { opts, fps, total, drawFrame, cv,
           totalSec: INTRO_SEC + scrollSec + FINAL_SEC, rows: doc.rows.length };
}

/* ============================================================
   PREVIEW / MP4 / WEBM
   ============================================================ */
async function runPreview(){
  if(busy) return; busy=true; setBusy(true);
  try{
    const P = await prepare();
    $("status").textContent = `Preview · ${P.totalSec.toFixed(1)}s · ${P.total} frames · ${P.rows} rows`;
    const frameDelay = 1000/P.fps; let g=0;
    await new Promise(res=>{ (function step(){
      P.drawFrame(g); setBar(g/P.total); g++;
      if(g>=P.total){ setBar(1); res(); return; }
      setTimeout(step, frameDelay);
    })(); });
    $("status").textContent = "Preview done.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

async function renderMP4(){
  if(busy) return; busy=true; setBusy(true);
  try{
    if(!("VideoEncoder" in window)) throw new Error("WebCodecs not supported — use WebM.");
    const P = await prepare();
    const { opts, fps, total, drawFrame, cv } = P;
    const muxer = new Mp4Muxer.Muxer({
      target: new Mp4Muxer.ArrayBufferTarget(),
      fastStart: "in-memory",
      video: { codec:"avc", width:opts.w, height:opts.h }
    });
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: e => { console.error(e); $("status").textContent = "Encoder error: "+e.message; }
    });
    encoder.configure({ codec:"avc1.4d0034", width:opts.w, height:opts.h, bitrate:8_000_000, framerate:fps });
    $("status").textContent = "Encoding MP4…";
    const usPerFrame = 1e6/fps;
    for(let g=0; g<total; g++){
      drawFrame(g);
      const vf = new VideoFrame(cv, { timestamp: Math.round(g*usPerFrame), duration: Math.round(usPerFrame) });
      encoder.encode(vf, { keyFrame: g % (fps*2) === 0 });
      vf.close();
      setBar(g/total); $("status").textContent = `Encoding MP4… ${Math.round(100*g/total)}%`;
      if(encoder.encodeQueueSize > 8) await new Promise(r=>setTimeout(r,0));
      else if(g % 4 === 0) await new Promise(r=>setTimeout(r,0));
    }
    await encoder.flush(); muxer.finalize();
    offerDownload("dl-mp4", new Blob([muxer.target.buffer], {type:"video/mp4"}), fileName("mp4"));
    setBar(1); $("status").textContent = "MP4 ready.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

async function renderWebM(){
  if(busy) return; busy=true; setBusy(true);
  try{
    const P = await prepare();
    const { fps, total, drawFrame, cv } = P;
    const stream = cv.captureStream(fps);
    let mime = "video/webm;codecs=vp9";
    if(!MediaRecorder.isTypeSupported(mime)) mime = "video/webm;codecs=vp8";
    if(!MediaRecorder.isTypeSupported(mime)) mime = "video/webm";
    const rec = new MediaRecorder(stream, { mimeType:mime, videoBitsPerSecond:8_000_000 });
    const chunks = []; rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
    const done = new Promise(res => rec.onstop = res); rec.start();
    $("status").textContent = "Recording WebM…";
    const frameDelay = 1000/fps; let g=0;
    await new Promise(res=>{ (function step(){
      drawFrame(g); setBar(g/total); $("status").textContent = `Recording WebM… ${Math.round(100*g/total)}%`;
      g++; if(g>=total){ res(); return; } setTimeout(step, frameDelay);
    })(); });
    rec.stop(); await done;
    offerDownload("dl-webm", new Blob(chunks, {type:"video/webm"}), fileName("webm"));
    setBar(1); $("status").textContent = "WebM ready.";
  }catch(e){ $("status").textContent = "Error: "+e.message; console.error(e); }
  busy=false; setBusy(false);
}

/* ---------- helpers ---------- */
function fileName(ext){
  const a = $("pa").value.replace(/\s+/g,"-").toLowerCase();
  const b = $("pb").value.replace(/\s+/g,"-").toLowerCase();
  return `teammates-${a}-vs-${b}.${ext}`;
}
function offerDownload(id, blob, name){
  const a = $(id); if(a.href) URL.revokeObjectURL(a.href);
  a.href = URL.createObjectURL(blob); a.download = name;
  a.textContent = `Download ${name.split(".").pop().toUpperCase()}`;
  a.style.display = "inline-flex"; $("downloads").style.display = "flex";
}
function setBar(p){ $("bar").style.width = (clamp(p,0,1)*100).toFixed(1)+"%"; }
function setBusy(b){ ["preview-btn","mp4-btn","webm-btn"].forEach(id=>$(id).disabled=b); }

/* ---------- wiring ---------- */
$("preview-btn").onclick = runPreview;
$("mp4-btn").onclick = renderMP4;
$("webm-btn").onclick = renderWebM;
["pa","pb","res","fps","dur","perItem","title","accent"].forEach(id=>{
  $(id).addEventListener("change", ()=>{ refreshMeta(); document.documentElement.style.setProperty("--accent", $("accent").value); });
  $(id).addEventListener("input",  ()=>{ if(id==="accent") document.documentElement.style.setProperty("--accent", $("accent").value); });
});
$("gran").querySelectorAll("button").forEach(btn=>{
  btn.onclick = ()=>{ $("gran").querySelectorAll("button").forEach(b=>b.classList.remove("on"));
    btn.classList.add("on"); granularity = btn.dataset.g; refreshMeta(); };
});

boot();
</script>
